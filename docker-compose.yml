version: "3.9"

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE}
    environment:
      PORT: 3000
      NODE_ENV: production
      APP_ENV: ${APP_ENV}
      IMAGE_TAG: ${IMAGE_TAG}
      GIT_SHA: ${GIT_SHA}
    depends_on:
      - mongo
      - redis
    expose:
      - "3000"

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: